name: xNotes
options:
  bundleIdPrefix: com.glitchFling
targets:
  xNotes:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [./]
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.glitchFling.xNotes
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        GENERATE_INFOPLIST_FILE: YES
    info:
      NSFaceIDUsageDescription: "xNotes uses FaceID to secure your private notes."
      CFBundleShortVersionString: "1.0"
      CFBundleVersion: "1"
      UILaunchScreen: {}
      UISupportedInterfaceOrientations:
        - UIInterfaceOrientationPortrait
