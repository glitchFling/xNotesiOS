name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Archive
      run: |
        xcodebuild archive \
          -project xNotes.xcodeproj \
          -scheme xNotes \
          -archivePath build/xNotes.xcarchive \
          CODE_SIGNING_ALLOWED=NO

    - name: Export IPA
      run: |
        # Since we're not using real code signing, we'll create a dummy IPA
        # by zipping the .app from the archive. Real IPA export requires signing.
        mkdir -p build/Payload
        cp -r build/xNotes.xcarchive/Products/Applications/xNotes.app build/Payload/
        cd build && zip -r xNotes.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xNotes-IPA
        path: build/xNotes.ipa
